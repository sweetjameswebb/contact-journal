<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a1a;
    --ink-soft: #555;
    --ink-faint: #999;
    --paper: #f7f4ef;
    --paper-card: #ffffff;
    --accent: #c8602a;
    --accent-light: #f2e8e1;
    --border: #e0dbd3;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.14);
    --radius: 12px;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
  }

  body {
    font-family: var(--font-body);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--ink);
    color: #fff;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .header-title span { color: var(--accent); }
  .btn-new {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-new:hover { background: #b0521f; }

  /* ── Search bar ── */
  .search-bar {
    padding: 24px 32px 0;
    max-width: 760px;
  }
  .search-input-wrap {
    position: relative;
  }
  .search-input-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-faint);
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 12px 14px 12px 42px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: var(--font-body);
    font-size: 15px;
    background: #fff;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }

  /* ── Tags filter ── */
  .tags-filter {
    padding: 14px 32px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    max-width: 900px;
  }
  .tag-pill {
    background: #fff;
    border: 1.5px solid var(--border);
    color: var(--ink-soft);
    padding: 5px 13px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font-body);
  }
  .tag-pill:hover, .tag-pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
    padding: 24px 32px 48px;
  }

  /* ── Card ── */
  .card {
    background: var(--paper-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.2s;
    animation: fadeUp 0.3s ease both;
  }
  .card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-2px);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card-avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 12px;
    display: block;
  }
  .card-avatar-initials {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 12px;
    flex-shrink: 0;
  }
  .card-name {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .card-location {
    font-size: 13px;
    color: var(--ink-faint);
    margin-bottom: 10px;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 10px;
  }
  .card-tag {
    background: var(--accent-light);
    color: var(--accent);
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
  }
  .card-comment {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-date {
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 10px;
  }

  /* ── Empty state ── */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: var(--ink-faint);
  }
  .empty p { font-size: 15px; margin-top: 8px; }

  /* ── Modal overlay ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(20,18,14,0.55);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ── Modal panel ── */
  .modal {
    background: #ffffff;
    border-radius: 16px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 32px;
    position: relative;
    animation: slideUp 0.25s ease;
    box-shadow: 0 24px 80px rgba(0,0,0,0.25);
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .modal-close {
    position: absolute;
    top: 18px; right: 18px;
    background: none; border: none;
    font-size: 22px; cursor: pointer;
    color: var(--ink-faint);
    line-height: 1;
  }
  .modal-close:hover { color: var(--ink); }
  .modal-title {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 24px;
    color: #1a1a1a;
  }

  /* ── Form ── */
  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .form-input, .form-textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 14px;
    color: #1a1a1a;
    background: #ffffff;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { min-height: 90px; resize: vertical; }

  /* ── Avatar upload ── */
  .avatar-upload {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
  }
  .avatar-preview {
    width: 64px; height: 64px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--border);
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--accent);
    overflow: hidden;
    flex-shrink: 0;
  }
  .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
  .btn-upload {
    background: none;
    border: 1.5px solid var(--border);
    padding: 8px 16px;
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 13px;
    cursor: pointer;
    color: var(--ink-soft);
    transition: all 0.15s;
  }
  .btn-upload:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Tags input ── */
  .tags-input-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: #ffffff;
    min-height: 44px;
    cursor: text;
    transition: border-color 0.15s;
  }
  .tags-input-wrap:focus-within { border-color: var(--accent); }
  .tag-chip {
    background: var(--accent-light);
    color: var(--accent);
    padding: 3px 8px 3px 10px;
    border-radius: 999px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .tag-chip button {
    background: none; border: none;
    color: var(--accent); cursor: pointer;
    font-size: 15px; line-height: 1;
    padding: 0;
  }
  .tags-text-input {
    border: none; outline: none;
    font-family: var(--font-body);
    font-size: 14px;
    color: #1a1a1a;
    background: transparent;
    flex: 1;
    min-width: 120px;
  }

  /* ── Modal actions ── */
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .btn-save {
    flex: 1;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 11px;
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-save:hover { background: #b0521f; }
  .btn-save:disabled { background: #ccc; cursor: not-allowed; }
  .btn-delete {
    background: none;
    border: 1.5px solid #e0dbd3;
    color: #c0392b;
    padding: 11px 18px;
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-delete:hover { background: #fef2f2; border-color: #c0392b; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: #fff;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 500;
    animation: toastIn 0.25s ease;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ── Loading ── */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--ink-faint);
    font-size: 15px;
    gap: 10px;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Scrollbar ── */
  .modal::-webkit-scrollbar { width: 4px; }
  .modal::-webkit-scrollbar-track { background: transparent; }
  .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div id="app">
  <header class="header">
    <div class="header-title">Contact <span>Journal</span></div>
    <button class="btn-new" onclick="openModal()">+ New Contact</button>
  </header>

  <div class="search-bar">
    <div class="search-input-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input class="search-input" id="searchInput" type="text"
        placeholder="Search by name, location, skill, or notes…"
        oninput="handleSearch(this.value)"/>
    </div>
  </div>

  <div class="tags-filter" id="tagsFilter"></div>
  <div class="grid" id="grid"><div class="loading"><div class="spinner"></div> Loading contacts…</div></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" style="display:none" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title" id="modalTitle">New Contact</div>

    <div class="avatar-upload">
      <div class="avatar-preview" id="avatarPreview">?</div>
      <div>
        <button class="btn-upload" onclick="document.getElementById('photoInput').click()">Upload photo</button>
        <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhoto(event)"/>
        <div style="font-size:12px;color:#999;margin-top:5px">JPG or PNG</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Full name *</label>
      <input class="form-input" id="fName" type="text" placeholder="e.g. John Doe"/>
    </div>
    <div class="form-group">
      <label class="form-label">Location</label>
      <input class="form-input" id="fLocation" type="text" placeholder="e.g. Tbilisi, Georgia"/>
    </div>
    <div class="form-group">
      <label class="form-label">Date met</label>
      <input class="form-input" id="fDateMet" type="date"/>
    </div>
    <div class="form-group">
      <label class="form-label">Fields of experience</label>
      <div class="tags-input-wrap" id="tagsInputWrap" onclick="document.getElementById('tagInput').focus()">
        <input class="tags-text-input" id="tagInput" type="text"
          placeholder="Type a skill and press Enter…"
          onkeydown="handleTagKey(event)"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <textarea class="form-textarea" id="fComment" placeholder="How you met, what you talked about, follow-ups…"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-save" id="btnSave" onclick="saveContact()">Save contact</button>
      <button class="btn-delete" id="btnDelete" style="display:none" onclick="deleteContact()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" style="display:none"></div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://myspuyrfeqvxqlunbdab.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qJat0cQJLfpJEvfFdEZ9HQ_qFwrKF84';

const COLORS = ['#c8602a','#2a7fc8','#2ac87f','#8a2ac8','#c82a6e','#c8a62a','#2ac8c0'];

// ── State ────────────────────────────────────────────────────────────────────
let contacts = [];
let filtered = [];
let searchQuery = '';
let activeTag = '';
let editingId = null;
let currentTags = [];
let photoFile = null;
let photoPreviewUrl = null;

// ── Supabase helpers ──────────────────────────────────────────────────────────
async function sbFetch(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + path, {
    ...opts,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(opts.headers || {})
    }
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadContacts() {
  try {
    const data = await sbFetch('/rest/v1/contacts?select=*&order=created_at.desc');
    contacts = data || [];
    applyFilter();
  } catch(e) {
    showToast('Could not load contacts: ' + e.message);
    document.getElementById('grid').innerHTML = '<div class="empty"><p>Could not connect to database. Check your Supabase settings.</p></div>';
  }
}

async function uploadPhoto(file, contactId) {
  const ext = file.name.split('.').pop();
  const path = `avatars/${contactId}.${ext}`;
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/contacts-photos/${path}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': file.type,
      'x-upsert': 'true'
    },
    body: file
  });
  if (!res.ok) return null;
  return `${SUPABASE_URL}/storage/v1/object/public/contacts-photos/${path}`;
}

// ── Render ───────────────────────────────────────────────────────────────────
function applyFilter() {
  const q = searchQuery.toLowerCase();
  filtered = contacts.filter(c => {
    const matchesSearch = !q ||
      (c.name || '').toLowerCase().includes(q) ||
      (c.location || '').toLowerCase().includes(q) ||
      (c.comment || '').toLowerCase().includes(q) ||
      (c.fields || []).some(f => f.toLowerCase().includes(q));
    const matchesTag = !activeTag || (c.fields || []).includes(activeTag);
    return matchesSearch && matchesTag;
  });
  renderGrid();
  renderTagsFilter();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty">
      <svg width="40" height="40" fill="none" stroke="#ccc" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <p>${searchQuery || activeTag ? 'No contacts match your search.' : 'No contacts yet. Add your first!'}</p>
    </div>`;
    return;
  }
  grid.innerHTML = filtered.map((c, i) => {
    const initials = (c.name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
    const color = c.color || COLORS[0];
    const avatarHtml = c.avatar_url
      ? `<img class="card-avatar" src="${c.avatar_url}" alt="${escHtml(c.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
         <div class="card-avatar-initials" style="background:${color};display:none">${initials}</div>`
      : `<div class="card-avatar-initials" style="background:${color}">${initials}</div>`;
    const tags = (c.fields || []).map(f =>
      `<span class="card-tag">${escHtml(f)}</span>`
    ).join('');
    const date = c.date_met ? `Met ${formatDate(c.date_met)}` : '';
    return `<div class="card" style="animation-delay:${i*0.04}s" onclick="openModal('${c.id}')">
      ${avatarHtml}
      <div class="card-name">${escHtml(c.name)}</div>
      ${c.location ? `<div class="card-location">${escHtml(c.location)}</div>` : ''}
      <div class="card-tags">${tags}</div>
      ${c.comment ? `<div class="card-comment">${escHtml(c.comment)}</div>` : ''}
      ${date ? `<div class="card-date">${date}</div>` : ''}
    </div>`;
  }).join('');
}

function renderTagsFilter() {
  const all = {};
  contacts.forEach(c => (c.fields || []).forEach(f => { all[f] = (all[f]||0)+1; }));
  const sorted = Object.entries(all).sort((a,b) => b[1]-a[1]).map(e => e[0]);
  const wrap = document.getElementById('tagsFilter');
  if (sorted.length === 0) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = sorted.map(t =>
    `<button class="tag-pill${activeTag===t?' active':''}" onclick="filterByTag('${escHtml(t)}')">${escHtml(t)}</button>`
  ).join('');
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(id) {
  editingId = id || null;
  currentTags = [];
  photoFile = null;
  photoPreviewUrl = null;

  document.getElementById('fName').value = '';
  document.getElementById('fLocation').value = '';
  document.getElementById('fDateMet').value = '';
  document.getElementById('fComment').value = '';
  document.getElementById('tagInput').value = '';
  document.getElementById('photoInput').value = '';
  renderTagChips();
  setAvatarPreview(null, null);

  if (id) {
    const c = contacts.find(x => x.id === id);
    if (!c) return;
    document.getElementById('modalTitle').textContent = 'Edit Contact';
    document.getElementById('btnDelete').style.display = 'block';
    document.getElementById('fName').value = c.name || '';
    document.getElementById('fLocation').value = c.location || '';
    document.getElementById('fDateMet').value = c.date_met || '';
    document.getElementById('fComment').value = c.comment || '';
    currentTags = [...(c.fields || [])];
    renderTagChips();
    if (c.avatar_url) {
      photoPreviewUrl = c.avatar_url;
      setAvatarPreview(c.avatar_url, null);
    } else {
      const initials = (c.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
      setAvatarPreview(null, initials, c.color);
    }
  } else {
    document.getElementById('modalTitle').textContent = 'New Contact';
    document.getElementById('btnDelete').style.display = 'none';
  }

  document.getElementById('overlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('overlay').style.display = 'none';
  editingId = null;
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function setAvatarPreview(url, initials, color) {
  const el = document.getElementById('avatarPreview');
  if (url) {
    el.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`;
  } else {
    el.style.background = color || '#eee';
    el.innerHTML = `<span style="font-family:'Playfair Display',serif;font-size:22px;color:${color ? '#fff' : '#aaa'}">${initials || '?'}</span>`;
  }
}

// ── Tags ──────────────────────────────────────────────────────────────────────
function handleTagKey(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim();
    if (val && !currentTags.includes(val)) {
      currentTags.push(val);
      renderTagChips();
    }
    e.target.value = '';
  }
  if (e.key === 'Backspace' && e.target.value === '' && currentTags.length > 0) {
    currentTags.pop();
    renderTagChips();
  }
}

function removeTag(i) {
  currentTags.splice(i, 1);
  renderTagChips();
}

function renderTagChips() {
  const wrap = document.getElementById('tagsInputWrap');
  const input = document.getElementById('tagInput');
  wrap.innerHTML = '';
  currentTags.forEach((t, i) => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    chip.innerHTML = `${escHtml(t)}<button onclick="removeTag(${i})">×</button>`;
    wrap.appendChild(chip);
  });
  wrap.appendChild(input);
}

// ── Photo ─────────────────────────────────────────────────────────────────────
function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  photoFile = file;
  const url = URL.createObjectURL(file);
  photoPreviewUrl = null;
  setAvatarPreview(url, null);
}

// ── Save / Delete ─────────────────────────────────────────────────────────────
async function saveContact() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { showToast('Name is required'); return; }

  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    const color = editingId
      ? (contacts.find(c=>c.id===editingId)?.color || randomColor())
      : randomColor();

    const payload = {
      name,
      location: document.getElementById('fLocation').value.trim() || null,
      date_met: document.getElementById('fDateMet').value || null,
      fields: currentTags,
      comment: document.getElementById('fComment').value.trim() || null,
      color
    };

    let savedId = editingId;

    if (editingId) {
      await sbFetch(`/rest/v1/contacts?id=eq.${editingId}`, {
        method: 'PATCH',
        body: JSON.stringify(payload)
      });
    } else {
      const res = await sbFetch('/rest/v1/contacts', {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      savedId = res[0].id;
    }

    // Upload photo if new one selected
    if (photoFile && savedId) {
      const url = await uploadPhoto(photoFile, savedId);
      if (url) {
        await sbFetch(`/rest/v1/contacts?id=eq.${savedId}`, {
          method: 'PATCH',
          body: JSON.stringify({ avatar_url: url })
        });
      }
    }

    await loadContacts();
    closeModal();
    showToast(editingId ? 'Contact updated!' : 'Contact saved!');
  } catch(e) {
    showToast('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save contact';
  }
}

async function deleteContact() {
  if (!editingId) return;
  if (!confirm('Delete this contact? This cannot be undone.')) return;
  try {
    await sbFetch(`/rest/v1/contacts?id=eq.${editingId}`, { method: 'DELETE' });
    await loadContacts();
    closeModal();
    showToast('Contact deleted.');
  } catch(e) {
    showToast('Error: ' + e.message);
  }
}

// ── Search / Filter ───────────────────────────────────────────────────────────
function handleSearch(val) {
  searchQuery = val;
  activeTag = '';
  applyFilter();
}

function filterByTag(tag) {
  activeTag = activeTag === tag ? '' : tag;
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  applyFilter();
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}
function randomColor() {
  return COLORS[Math.floor(Math.random() * COLORS.length)];
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadContacts();
</script>

</html>
